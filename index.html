<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DQMJRKA BET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dqmjrka-bet-v4"; // Новая версия ID для чистоты данных

        let currentUid = null;
        let balance = 0;
        let isMaintenance = false;
        let usedPromos = [];

        // Game state
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 90;

        // Mines state
        let minesCount = 5;
        let minePositions = [];
        let revealedCells = [];
        let isMinesActive = false;
        let currentMult = 1.0;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                
                // Проверка существования юзера
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { balance: 0, usedPromos: [], lastActive: Date.now() });
                }

                // Подписка на данные юзера
                onSnapshot(userRef, (d) => {
                    if (d.exists()) {
                        const data = d.data();
                        balance = data.balance || 0;
                        usedPromos = data.usedPromos || [];
                        document.querySelectorAll('.balance-val').forEach(el => el.textContent = balance);
                    }
                });

                // Тех работы
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'config'), (d) => {
                    if (d.exists()) {
                        isMaintenance = d.data().maintenance || false;
                        document.getElementById('m-screen').style.display = isMaintenance ? 'flex' : 'none';
                    }
                });
            } else {
                signInAnonymously(auth);
            }
        });

        // --- NAVIGATION ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`${tab}-page`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- SLOTS ---
        window.spin = async () => {
            if (balance < 1 || isMaintenance) return;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
            await updateDoc(userRef, { balance: increment(-1) });

            const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2')];
            const results = await Promise.all(reels.map((r, i) => {
                return new Promise(resolve => {
                    const target = symbols[Math.floor(Math.random() * symbols.length)];
                    const items = r.querySelectorAll('.s-item');
                    items[items.length - 1].textContent = target;
                    const duration = 1500 + (i * 400);
                    
                    r.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0.9, 0.1, 1)`;
                    r.style.transform = `translateY(-${(items.length - 1) * ITEM_HEIGHT}px)`;
                    
                    setTimeout(() => {
                        r.style.transition = 'none';
                        r.style.transform = 'translateY(0)';
                        items.forEach(it => it.textContent = target);
                        resolve(target);
                    }, duration);
                });
            }));

            const counts = {};
            results.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));

            if (max >= 2) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('win-modal').style.display = 'flex';
                const isJack = max === 3;
                document.getElementById('win-title').textContent = isJack ? "JACKPOT!" : "BIG WIN!";
                document.getElementById('win-opt1').textContent = isJack ? "+3 СПИНА" : "+2 СПИНА";
                window.lastWinType = max;
            }
            btn.disabled = false;
        };

        window.claimWin = async (choice) => {
            document.getElementById('win-modal').style.display = 'none';
            if (choice === 1) {
                const add = window.lastWinType === 3 ? 3 : 2;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
                await updateDoc(userRef, { balance: increment(add) });
            }
        };

        // --- MINES ---
        window.initMines = () => {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.innerHTML = '<div class="cell-inner">?</div>';
                cell.onclick = () => revealCell(i, cell);
                grid.appendChild(cell);
            }
            isMinesActive = false;
            document.getElementById('mines-action-btn').textContent = 'ИГРАТЬ';
            document.getElementById('mines-mult').textContent = 'x1.00';
        };

        window.handleMinesAction = async () => {
            const btn = document.getElementById('mines-action-btn');
            if (!isMinesActive) {
                // Start
                if (balance < 1) return alert('Мало спинов');
                const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
                await updateDoc(userRef, { balance: increment(-1) });

                minesCount = parseInt(document.getElementById('mine-count').value) || 3;
                minePositions = [];
                while(minePositions.length < minesCount) {
                    let r = Math.floor(Math.random() * 25);
                    if(!minePositions.includes(r)) minePositions.push(r);
                }
                
                revealedCells = [];
                isMinesActive = true;
                currentMult = 1.0;
                document.querySelectorAll('.mine-cell').forEach(c => c.className = 'mine-cell');
                btn.textContent = 'ЗАБРАТЬ';
            } else {
                // Cashout
                const win = Math.floor(1 * currentMult);
                if (win > 0) {
                    const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
                    await updateDoc(userRef, { balance: increment(win) });
                    alert(`Вы выиграли ${win} спинов!`);
                }
                initMines();
            }
        };

        function revealCell(idx, el) {
            if (!isMinesActive || revealedCells.includes(idx)) return;
            revealedCells.push(idx);
            
            if (minePositions.includes(idx)) {
                el.classList.add('bomb');
                el.innerHTML = '<i class="fas fa-bomb"></i>';
                isMinesActive = false;
                setTimeout(() => { alert('БОМБА! Вы проиграли.'); initMines(); }, 300);
            } else {
                el.classList.add('gem');
                el.innerHTML = '<i class="fas fa-gem"></i>';
                // Рассчет множителя (упрощенный)
                const n = 25;
                const m = minesCount;
                const r = revealedCells.length;
                let mult = 1;
                for(let i=0; i<r; i++) mult *= (n-i)/(n-m-i);
                currentMult = mult;
                document.getElementById('mines-mult').textContent = `x${mult.toFixed(2)}`;
            }
        }

        // --- PROMO ---
        window.activatePromo = async () => {
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            if (!code || usedPromos.includes(code)) return alert('Код неверный или уже использован');
            
            const promoRef = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const snap = await getDoc(promoRef);
            
            if (snap.exists()) {
                const data = snap.data();
                if (data.uses >= data.maxUses) return alert('Лимит кода исчерпан');
                
                const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
                await updateDoc(userRef, { 
                    balance: increment(data.value),
                    usedPromos: arrayUnion(code)
                });
                await updateDoc(promoRef, { uses: increment(1) });
                alert('Спины начислены!');
                document.getElementById('promo-input').value = '';
            } else {
                alert('Такого кода нет');
            }
        };

        // --- ADMIN PANEL ---
        window.openAdmin = () => {
            const pass = prompt('Пароль:');
            if (pass === '0501') {
                document.getElementById('admin-modal').style.display = 'flex';
                loadAdminUsers();
                loadAdminPromos();
            }
        };

        window.loadAdminUsers = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'users'));
            const list = document.getElementById('adm-user-list');
            list.innerHTML = '';
            
            for (const uDoc of snap.docs) {
                const profile = await getDoc(doc(db, 'artifacts', appId, 'users', uDoc.id, 'profile', 'data'));
                if (profile.exists()) {
                    const data = profile.data();
                    const card = document.createElement('div');
                    card.className = 'admin-card';
                    card.innerHTML = `
                        <div style="flex:1">
                            <div style="font-size:0.6rem; opacity:0.5;">ID: ${uDoc.id.slice(0,8)}...</div>
                            <div style="font-weight:700">Спины: ${data.balance}</div>
                        </div>
                        <div style="display:flex; gap:5px">
                            <input type="number" id="inp-${uDoc.id}" style="width:50px; background:#111; border:1px solid #333; color:#fff; padding:5px; border-radius:5px">
                            <button onclick="setBalance('${uDoc.id}')" style="background:var(--accent); border:none; color:#fff; padding:5px 10px; border-radius:5px; font-size:0.7rem">SET</button>
                        </div>
                    `;
                    list.appendChild(card);
                }
            }
        };

        window.setBalance = async (uid) => {
            const val = parseInt(document.getElementById(`inp-${uid}`).value);
            if (!isNaN(val)) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), { balance: val });
                loadAdminUsers();
            }
        };

        window.createPromo = async () => {
            const name = document.getElementById('adm-p-name').value.toUpperCase();
            const val = parseInt(document.getElementById('adm-p-val').value);
            const max = parseInt(document.getElementById('adm-p-max').value);
            if (name && val && max) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), {
                    value: val, maxUses: max, uses: 0
                });
                alert('Промокод создан');
                loadAdminPromos();
            }
        };

        window.loadAdminPromos = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'promocodes'));
            const list = document.getElementById('adm-promo-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const item = document.createElement('div');
                item.className = 'admin-card';
                item.innerHTML = `
                    <div style="flex:1">
                        <div style="font-weight:800; color:var(--accent)">${d.id}</div>
                        <div style="font-size:0.7rem; opacity:0.6">+${data.value}🎰 | ${data.uses}/${data.maxUses} акт.</div>
                    </div>
                    <button onclick="deletePromo('${d.id}')" style="background:#ef4444; border:none; color:#fff; padding:5px; border-radius:5px; font-size:0.6rem">DEL</button>
                `;
                list.appendChild(item);
            });
        };

        window.deletePromo = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', id));
            loadAdminPromos();
        };

        window.toggleTech = async (status) => {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'config'), { maintenance: status });
        };

        // --- INIT ---
        window.onload = () => {
            const reels = document.querySelectorAll('.s-reel');
            reels.forEach(r => {
                for(let i=0; i<35; i++) {
                    const d = document.createElement('div');
                    d.className = 's-item';
                    d.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    r.appendChild(d);
                }
            });
            initMines();
        };

        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
    </script>

    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #f0f6fc; --gray: #8b949e; --border: #30363d; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* HEADER */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--accent); }
        .bal-badge { background: var(--card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; }

        /* PAGES */
        .app-page { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        .app-page.active { display: block; }

        /* SLOTS */
        .slots-box { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .s-view { display: flex; justify-content: center; gap: 8px; background: #000; padding: 10px; border-radius: 15px; height: 110px; overflow: hidden; margin: 20px 0; }
        .s-win { width: 80px; height: 90px; background: #0d1117; border-radius: 10px; position: relative; overflow: hidden; }
        .s-reel { position: absolute; top:0; width:100%; display: flex; flex-direction: column; }
        .s-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--accent); color: #fff; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }

        /* MINES */
        .m-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .mine-cell { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
        .mine-cell.gem { background: #1a3a2a; color: #39d353; font-size: 1.5rem; }
        .mine-cell.bomb { background: #3a1a1a; color: #f85149; font-size: 1.5rem; }
        .m-stats { display: flex; justify-content: space-between; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 10px; }

        /* NAV BAR (iOS STYLE) */
        .nav-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 100; }
        .nav-bar { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 35px; display: flex; padding: 10px; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--accent); }

        /* MODALS */
        .modal { position: fixed; inset:0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 350px; padding: 25px; border-radius: 25px; }

        /* ADMIN */
        .admin-card { background: #0d1117; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; }
        .adm-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 5px; cursor: pointer; font-weight: 700; }

        .promo-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; font-size: 1rem; text-align: center; font-weight: 800; }

        .m-screen { position: fixed; inset:0; background: #0d1117; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="m-screen" class="m-screen">
        <i class="fas fa-hammer" style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h1>ОБНОВЛЕНИЕ</h1>
        <p style="opacity: 0.6;">Мы скоро вернемся. Наберитесь терпения!</p>
        <button onclick="openAdmin()" style="margin-top: 50px; background: none; border: none; color: #222;">PANEL</button>
    </div>

    <header>
        <div class="logo">DQMJRKA</div>
        <div class="bal-badge"><i class="fas fa-coins" style="color: gold;"></i> <span class="balance-val">0</span></div>
    </header>

    <!-- SLOTS -->
    <div id="slots-page" class="app-page active">
        <div class="slots-box">
            <div class="s-view">
                <div class="s-win"><div class="s-reel" id="r0"></div></div>
                <div class="s-win"><div class="s-reel" id="r1"></div></div>
                <div class="s-win"><div class="s-reel" id="r2"></div></div>
            </div>
            <button class="btn-main" id="spin-btn" onclick="spin()">КРУТИТЬ (1 🎰)</button>
        </div>
        <div style="text-align: center; margin-top: 40px; font-size: 0.6rem; opacity: 0.2;" onclick="openAdmin()">V4.0.1 SYSTEM</div>
    </div>

    <!-- MINES -->
    <div id="mines-page" class="app-page">
        <div class="m-stats">
            <div><span style="font-size: 0.6rem; opacity: 0.5; display: block;">МНОЖИТЕЛЬ</span> <b id="mines-mult" style="color: #39d353;">x1.00</b></div>
            <div style="text-align: right;"><span style="font-size: 0.6rem; opacity: 0.5; display: block;">СТАВКА</span> <b>1 🎰</b></div>
        </div>
        <div class="m-grid" id="mines-grid"></div>
        <div class="slots-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Мины:</span>
                <input type="number" id="mine-count" value="3" min="1" max="20" style="width: 60px; background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; text-align: center;">
            </div>
            <button class="btn-main" id="mines-action-btn" onclick="handleMinesAction()">ИГРАТЬ</button>
        </div>
    </div>

    <!-- PROMO -->
    <div id="promo-page" class="app-page">
        <h2>ПРОМОКОД</h2>
        <div class="slots-box">
            <input type="text" id="promo-input" class="promo-input" placeholder="ВВЕДИТЕ КОД">
            <button class="btn-main" onclick="activatePromo()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-wrap">
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('slots')">
                <i class="fas fa-dice"></i>
                <span>Слоты</span>
            </div>
            <div class="nav-item" onclick="switchTab('mines')">
                <i class="fas fa-bomb"></i>
                <span>Мины</span>
            </div>
            <div class="nav-item" onclick="switchTab('promo')">
                <i class="fas fa-ticket-alt"></i>
                <span>Промо</span>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" class="modal">
        <div class="modal-box" style="text-align: center;">
            <h1 id="win-title" style="color: var(--accent); margin-top: 0;">WIN!</h1>
            <button class="btn-main" id="win-opt1" onclick="claimWin(1)" style="margin-bottom: 10px;">+2 СПИНА</button>
            <button class="btn-main" onclick="claimWin(2)" style="background: #21262d;">ВЕРНУТЬ ВЕЩЬ</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-modal" class="modal">
        <div class="modal-box" style="max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-top: 0;">ПАНЕЛЬ УПРАВЛЕНИЯ</h3>
            
            <div style="background: #000; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <p style="font-size: 0.7rem; margin-bottom: 10px;">ТЕХ. РАБОТЫ:</p>
                <button class="adm-btn" onclick="toggleTech(true)" style="background: #f85149; color: #fff;">ВКЛЮЧИТЬ</button>
                <button class="adm-btn" onclick="toggleTech(false)" style="background: #39d353; color: #fff;">ВЫКЛЮЧИТЬ</button>
            </div>

            <p style="font-size: 0.8rem; font-weight: 700;">ПРОМО:</p>
            <input id="adm-p-name" placeholder="КОД" class="promo-input" style="padding: 10px; font-size: 0.8rem;">
            <input id="adm-p-val" type="number" placeholder="СПИНЫ" class="promo-input" style="padding: 10px; font-size: 0.8rem;">
            <input id="adm-p-max" type="number" placeholder="АКТИВАЦИИ" class="promo-input" style="padding: 10px; font-size: 0.8rem;">
            <button class="adm-btn" onclick="createPromo()" style="background: var(--accent); color: #fff;">СОЗДАТЬ</button>
            <div id="adm-promo-list"></div>

            <p style="font-size: 0.8rem; font-weight: 700; margin-top: 20px;">ПОЛЬЗОВАТЕЛИ:</p>
            <button class="adm-btn" onclick="loadAdminUsers()" style="background: #21262d; color: #fff;">ОБНОВИТЬ СПИСОК</button>
            <div id="adm-user-list"></div>

            <button class="btn-main" onclick="closeModals()" style="background: #21262d; margin-top: 20px;">ЗАКРЫТЬ</button>
        </div>
    </div>

</body>
</html>
