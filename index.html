<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQMJRKA BET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion, deleteDoc, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            databaseURL: "https://clutchdq-default-rtdb.firebaseio.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109",
            measurementId: "G-7PBE17HMH3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dqmjrka-bet-final"; 

        let currentUser = null;
        let balance = 0;
        let usedPromos = [];
        let isMaintenance = false;
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 100;

        const balanceText = document.getElementById('balanceText');
        const spinBtn = document.getElementById('spinBtn');
        const maintenanceScreen = document.getElementById('maintenanceScreen');
        const reelEls = [document.getElementById('reel0'), document.getElementById('reel1'), document.getElementById('reel2')];

        reelEls.forEach(reel => {
            const content = Array.from({length: 40}, () => `<div class="slot-item">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`);
            reel.innerHTML = content.join('');
        });

        signInAnonymously(auth).catch(e => console.error("Auth Error:", e));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const configRef = doc(db, 'artifacts', appId, 'public', 'config');
                onSnapshot(configRef, (snap) => {
                    if (snap.exists()) {
                        isMaintenance = snap.data().maintenance || false;
                        maintenanceScreen.style.display = isMaintenance ? 'flex' : 'none';
                    } else {
                        setDoc(configRef, { maintenance: false });
                    }
                });

                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const userDoc = await getDoc(userDocRef);
                if (!userDoc.exists()) {
                    await setDoc(userDocRef, { balance: 0, usedPromos: [], lastActive: Date.now() });
                }

                onSnapshot(userDocRef, (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        balance = data.balance || 0;
                        usedPromos = data.usedPromos || [];
                        balanceText.textContent = balance;
                        if (!isMaintenance) spinBtn.disabled = balance <= 0;
                    }
                });

                // Админ: Промокоды
                const promoCol = collection(db, 'artifacts', appId, 'public', 'data', 'promocodes');
                onSnapshot(promoCol, (snap) => {
                    const container = document.getElementById('promoManagerList');
                    container.innerHTML = '';
                    snap.forEach(d => {
                        const data = d.data();
                        const card = document.createElement('div');
                        card.className = 'admin-item-card';
                        card.innerHTML = `
                            <div style="flex:1">
                                <div style="font-weight:800; color:#c084fc;">${d.id}</div>
                                <div style="font-size:0.7rem; opacity:0.7;">${data.value} 🎰 | ${data.uses}/${data.maxUses} акт.</div>
                            </div>
                            <button class="delete-btn" onclick="deletePromoCode('${d.id}')">УДАЛИТЬ</button>
                        `;
                        container.appendChild(card);
                    });
                });

                // Админ: Юзеры
                const usersCol = collection(db, 'artifacts', appId, 'users');
                onSnapshot(usersCol, async (snap) => {
                    const container = document.getElementById('userManagerList');
                    container.innerHTML = '';
                    for (const userFolder of snap.docs) {
                        const profileRef = doc(db, 'artifacts', appId, 'users', userFolder.id, 'profile', 'data');
                        const profileSnap = await getDoc(profileRef);
                        if (profileSnap.exists()) {
                            const uData = profileSnap.data();
                            const card = document.createElement('div');
                            card.className = 'admin-item-card';
                            card.innerHTML = `
                                <div style="flex:1">
                                    <div style="font-size:0.6rem; opacity:0.4;">ID: ${userFolder.id.substring(0,8)}...</div>
                                    <div style="font-weight:800; color:#fff;">БАЛАНС: ${uData.balance}</div>
                                </div>
                                <div style="display:flex; gap:5px;">
                                    <input type="number" id="edit-${userFolder.id}" class="input-base" style="width:60px; padding:8px; font-size:0.8rem" placeholder="0">
                                    <button class="nav-btn" style="padding:8px" onclick="updateUserBalance('${userFolder.id}')">SET</button>
                                </div>
                            `;
                            container.appendChild(card);
                        }
                    }
                });
            }
        });

        window.toggleMaintenance = async (status) => {
            const configRef = doc(db, 'artifacts', appId, 'public', 'config');
            await updateDoc(configRef, { maintenance: status });
        };

        window.updateUserBalance = async (uid) => {
            const input = document.getElementById(`edit-${uid}`);
            const newVal = parseInt(input.value);
            if (!isNaN(newVal)) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), { balance: newVal });
                input.value = '';
                alert("Баланс обновлен");
            }
        };

        window.deletePromoCode = async (id) => {
            if(confirm('Удалить промокод?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', id));
            }
        };

        window.handleSpin = async () => {
            if (!currentUser || balance <= 0 || isMaintenance) return;
            const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
            await updateDoc(userDocRef, { balance: balance - 1 });
            spinBtn.disabled = true;
            const results = await Promise.all(reelEls.map((reel, i) => animateReel(reel, i)));
            checkWin(results);
        };

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                const items = reel.querySelectorAll('.slot-item');
                items[items.length - 1].textContent = targetSymbol;
                const duration = 2000 + (index * 600);
                reel.style.transition = `transform ${duration}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
                reel.style.transform = `translateY(-${(items.length - 1) * ITEM_HEIGHT}px)`;
                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    items.forEach(item => item.textContent = targetSymbol);
                    resolve(targetSymbol);
                }, duration);
            });
        }

        function checkWin(res) {
            const counts = {};
            res.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));
            if (max >= 2) showChoiceModal(max);
            else spinBtn.disabled = balance <= 0;
        }

        function showChoiceModal(type) {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 }, colors: ['#a855f7', '#ffffff'] });
            document.getElementById('winChoiceModal').style.display = 'flex';
            const isJackpot = type === 3;
            
            // Тексты согласно запросу
            document.getElementById('choiceTitle').textContent = isJackpot ? "JACKPOT (3/3)" : "BIG WIN (2/3)";
            document.getElementById('btnOpt1').textContent = isJackpot ? "+3 СПИНА" : "+2 СПИНА";
            document.getElementById('btnOpt2').textContent = isJackpot ? "X2 ВЕЩЬ" : "ВЕРНУТЬ ВЕЩЬ";
            window.currentWinType = type;
        }

        window.makeChoice = async (option) => {
            const type = window.currentWinType;
            document.getElementById('winChoiceModal').style.display = 'none';
            if (option === 1) {
                // Логика: если джекпот(3) то +3, если биг вин(2) то +2
                const add = type === 3 ? 3 : 2; 
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'), { balance: balance + add });
            }
            spinBtn.disabled = balance <= 0;
        };

        window.activatePromo = async () => {
            const input = document.getElementById('promoInput');
            const code = input.value.trim().toUpperCase();
            if (!code || !currentUser || isMaintenance) return;
            if (usedPromos.includes(code)) return alert('Вы уже использовали этот код');

            const promoRef = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const promoSnap = await getDoc(promoRef);
            if (promoSnap.exists()) {
                const data = promoSnap.data();
                if (data.uses >= data.maxUses) return alert('Лимит активаций исчерпан');
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'), { 
                    balance: balance + data.value,
                    usedPromos: arrayUnion(code)
                });
                await updateDoc(promoRef, { uses: increment(1) });
                input.value = '';
                alert('Спины начислены!');
            } else alert('Код не существует');
        };

        window.savePromo = async () => {
            const name = document.getElementById('newPromoName').value.trim().toUpperCase();
            const val = parseInt(document.getElementById('newPromoVal').value);
            const max = parseInt(document.getElementById('newPromoMax').value);
            if (name && !isNaN(val) && !isNaN(max)) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), { value: val, maxUses: max, uses: 0 });
                alert('Промокод создан');
                document.querySelectorAll('#createView input').forEach(i => i.value = '');
            }
        };

        window.toggleAdminView = (view) => {
            ['create', 'manage', 'users'].forEach(v => {
                document.getElementById(`${v}View`).style.display = view === v ? 'block' : 'none';
                document.getElementById(`nav-${v}`).classList.toggle('active', view === v);
            });
        };

        window.openAuth = () => { document.getElementById('authModal').style.display = 'flex'; };
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
        window.checkPass = () => {
            if (document.getElementById('adminPass').value === '0501') {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('adminModal').style.display = 'flex';
                toggleAdminView('create');
            } else alert('Ошибка доступа');
        };
    </script>

    <style>
        :root { --bg: #0f0a1a; --card: #1a1429; --accent: #a855f7; --text: #f3f4f6; --border: #312e81; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .casino-card { background: var(--card); border-radius: 32px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 0 50px rgba(168, 85, 247, 0.15); text-align: center; }
        h1 { font-weight: 800; font-size: 1.4rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 25px; }
        
        .balance-badge { background: rgba(0,0,0,0.3); padding: 12px 30px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; display: inline-block; }
        .balance-label { font-size: 0.6rem; opacity: 0.5; display: block; }
        .balance-value { font-weight: 800; font-size: 1.8rem; color: #fff; }
        
        .slot-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; background: #000; padding: 15px; border-radius: 24px; border: 2px solid var(--border); }
        .slot-window { width: 85px; height: 100px; background: #050505; border-radius: 12px; position: relative; overflow: hidden; }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }
        .slot-item { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; }
        
        .btn-main { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, #a855f7, #7e22ce); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .promo-group { display: flex; gap: 8px; }
        .input-base { flex: 1; background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 16px; color: #fff; outline: none; }
        .btn-side { background: #2d2146; border: none; color: #fff; padding: 0 22px; border-radius: 16px; cursor: pointer; font-weight: 600; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 5, 20, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(12px); }
        .modal-box { background: var(--card); width: 92%; max-width: 380px; padding: 30px; border-radius: 32px; border: 1px solid var(--border); text-align: center; max-height: 85vh; overflow-y: auto; }
        
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .nav-btn { padding: 10px; border-radius: 12px; background: #2d2146; color: #fff; border: 1px solid var(--border); cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .nav-btn.active { background: var(--accent); }
        
        .admin-item-card { background: #0b0714; padding: 14px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; text-align: left; border: 1px solid var(--border); }
        .delete-btn { background: #ef4444; color: #fff; border: none; font-size: 0.6rem; padding: 8px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        .maintenance-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f0a1a; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .m-btn { background: #2d2146; color: #fff; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; margin-top: 30px; font-weight: 800; cursor: pointer; }

        .m-ctrl-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; color: #fff; font-weight: 800; margin-bottom: 8px; cursor: pointer; font-size: 0.7rem; }
        .btn-red { background: #ef4444; }
        .btn-green { background: #22c55e; }

        .admin-link { margin-top: 30px; font-size: 0.65rem; opacity: 0.2; cursor: pointer; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="maintenanceScreen" class="maintenance-screen">
        <div style="font-size: 5rem; margin-bottom: 20px;">🛠️</div>
        <h1 style="color: var(--accent); letter-spacing: 5px;">ТЕХНИЧЕСКИЕ РАБОТЫ</h1>
        <p style="opacity: 0.6; font-size: 0.9rem;">DQMJRKA BET временно не работает. Сейчас идет обновление или исправление ошибок/багов. Просим прощения за неудобства. Промокод: SORRY (3 фри спина)</p>
        <button class="m-btn" onclick="openAuth()">ADMIN LOGIN</button>
    </div>

    <div class="container">
        <div class="casino-card">
            <h1>DQMJRKA BET</h1>
            <div class="balance-badge">
                <span class="balance-label">СПИНЫ</span>
                <span class="balance-value" id="balanceText">0</span>
            </div>
            <div class="slot-container">
                <div class="slot-window"><div class="slot-reel" id="reel0"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel2"></div></div>
            </div>
            <button class="btn-main" id="spinBtn" onclick="handleSpin()">ИГРАТЬ</button>
            <div class="promo-group">
                <input type="text" id="promoInput" class="input-base" placeholder="Промокод">
                <button class="btn-side" onclick="activatePromo()">ОК</button>
            </div>
            <div class="admin-link" onclick="openAuth()">PANEL</div>
        </div>
    </div>

    <div id="winChoiceModal" class="modal">
        <div class="modal-box">
            <h2 id="choiceTitle" style="color: var(--accent);">ПОБЕДА</h2>
            <button class="btn-main" id="btnOpt1" onclick="makeChoice(1)"></button>
            <button class="btn-main" id="btnOpt2" onclick="makeChoice(2)" style="background: #2d2146; border: 2px solid var(--accent);"></button>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3>ВХОД</h3>
            <input type="password" id="adminPass" class="input-base" style="width:100%; text-align:center; letter-spacing: 12px; margin: 20px 0;" placeholder="****">
            <button class="btn-main" onclick="checkPass()">ВОЙТИ</button>
            <button class="btn-side" style="width:100%; padding:15px;" onclick="closeModals()">ОТМЕНА</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-box" style="text-align: left;">
            <div class="admin-nav">
                <button class="nav-btn active" id="nav-create" onclick="toggleAdminView('create')">ПРОМО</button>
                <button class="nav-btn" id="nav-manage" onclick="toggleAdminView('manage')">КОДЫ</button>
                <button class="nav-btn" id="nav-users" onclick="toggleAdminView('users')">ЮЗЕРЫ</button>
            </div>

            <div style="margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px;">
                <button class="m-ctrl-btn btn-red" onclick="toggleMaintenance(true)">ВКЛЮЧИТЬ ТЕХ</button>
                <button class="m-ctrl-btn btn-green" onclick="toggleMaintenance(false)">ВЫКЛЮЧИТЬ ТЕХ</button>
            </div>

            <div id="createView">
                <input type="text" id="newPromoName" class="input-base" style="width:100%; margin-bottom:10px;" placeholder="КОД">
                <input type="number" id="newPromoVal" class="input-base" style="width:100%; margin-bottom:10px;" placeholder="СПИНЫ">
                <input type="number" id="newPromoMax" class="input-base" style="width:100%; margin-bottom:15px;" placeholder="ЛИМИТ">
                <button class="btn-main" onclick="savePromo()">СОЗДАТЬ</button>
            </div>

            <div id="manageView" style="display:none;">
                <div id="promoManagerList"></div>
            </div>

            <div id="usersView" style="display:none;">
                <div id="userManagerList"></div>
            </div>

            <button class="btn-side" style="width:100%; padding:15px; margin-top:10px" onclick="closeModals()">ЗАКРЫТЬ</button>
        </div>
    </div>

</body>
</html>
