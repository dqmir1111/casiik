<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQBET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* ================= LIQUID GLASS СТИЛИ ================= */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        .balance-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .games-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }

        .glass-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Кнопки и Инпуты */
        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            text-align: center;
            width: 80px;
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.3), 0 0 15px rgba(255,255,255,0.2);
        }

        .glass-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ================= СТИЛИ ДЛЯ МИН ================= */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .mine-cell {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .mine-cell:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .mine-cell.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .mine-cell.bomb {
            background: rgba(255, 50, 50, 0.4);
            border-color: #ff3333;
        }

        .mine-cell.gem {
            background: rgba(50, 255, 50, 0.4);
            border-color: #33ff33;
        }

        .multiplier-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #00ffcc;
        }

        /* ================= СТИЛИ ДЛЯ КОЛЕСА ================= */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 10px auto 20px auto;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 35px;
            color: #ff3366;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 1);
            position: relative;
            overflow: hidden;
        }

        .wheel-label {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 20px;
            margin-left: -30px;
            margin-top: -10px;
            text-align: center;
            font-weight: 800;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .footer {
            margin-top: 50px;
            opacity: 0.5;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-badge">Баланс: <span id="balance">1000</span> ₽</div>
    </div>

    <div class="games-container">
        
        <div class="glass-panel" id="mines-section">
            <h2>Мины</h2>
            
            <div id="mines-mult" class="multiplier-badge">x1.00</div>
            <div class="mines-grid" id="mines-grid"></div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; width: 100%; justify-content: center;">
                <input type="number" id="mines-bet" value="10" placeholder="Ставка" title="Ставка">
                <input type="number" id="mine-count" value="3" min="1" max="24" placeholder="Мин" title="Кол-во мин">
            </div>
            
            <button id="mines-btn" class="glass-btn" style="width: 100%;" onclick="window.handleMines()">НАЧАТЬ ИГРУ</button>
        </div>

        <div class="glass-panel" id="wheel-section">
            <h2>Колесо Фортуны</h2>
            
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <div id="wheel" class="wheel"></div>
            </div>
            
            <div class="game-controls" style="margin-top: 10px; display: flex; gap: 10px; justify-content: center; width: 100%;">
                <input type="number" id="wheel-price" value="10" readonly style="cursor: not-allowed; width: 60px;" title="Цена прокрута">
                <button id="wheel-btn" class="glass-btn" style="flex-grow: 1;" onclick="window.spinWheel()">КРУТИТЬ (10 ₽)</button>
            </div>
        </div>

    </div>

    <div class="footer">
        Powered by ThisTeam
    </div>

    <script type="module">
        // ================= ГЛОБАЛЬНЫЙ БАЛАНС =================
        window.userBalance = 1000;
        
        window.updateBalance = async (amount) => {
            window.userBalance += amount;
            document.getElementById('balance').textContent = window.userBalance;
        };

        // ================= MINES =================
        let minesActive = false, minePos = [], revCells = [], curBet = 0, curMinesCount = 3, curMult = 1;

        window.initMines = () => {
            const grid = document.getElementById('mines-grid');
            if(!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const c = document.createElement('div');
                c.className = 'mine-cell disabled';
                c.innerHTML = '<i class="fas fa-lock"></i>';
                c.onclick = () => {
                    if (!minesActive || revCells.includes(i)) return;
                    revCells.push(i);
                    
                    if (minePos.includes(i)) {
                        // ПРОИГРЫШ
                        c.className = 'mine-cell bomb'; c.innerHTML = '💣';
                        minesActive = false;
                        minePos.forEach(p => {
                            const cell = grid.children[p];
                            if(!revCells.includes(p)) { cell.innerHTML = '💣'; cell.style.opacity = '0.5'; }
                        });
                        setTimeout(() => { alert('ВЗРЫВ!'); window.initMines(); }, 500);
                    } else {
                        // УСПЕХ
                        c.className = 'mine-cell gem'; c.innerHTML = '💎';
                        const r = revCells.length;
                        const m = curMinesCount;

                        if (m === 1) {
                            const steps = { 1: 1.05, 2: 1.09, 3: 1.15, 4: 1.2, 5: 1.3, 6: 1.4, 7: 1.7, 8: 2, 9: 2.5, 10: 3, 11: 4, 12: 5 };
                            curMult = steps[r] || (5 + (r - 12));
                        } else if (m >= 20) {
                            const steps = { 1: 5, 2: 10, 3: 20, 4: 25, 5: 50 };
                            curMult = steps[r] || (50 * Math.pow(1.5, r - 5));
                        } else {
                            let chance = 1;
                            for (let j = 0; j < r; j++) chance *= (25 - m - j) / (25 - j);
                            curMult = (1 / chance) * 0.97;
                        }

                        document.getElementById('mines-mult').textContent = 'x' + curMult.toFixed(2);
                        document.getElementById('mines-btn').textContent = `ЗАБРАТЬ ${Math.floor(curBet * curMult)} ₽`;
                    }
                };
                grid.appendChild(c);
            }
            minesActive = false;
            curMult = 1;
            document.getElementById('mines-btn').textContent = 'НАЧАТЬ ИГРУ';
            document.getElementById('mines-mult').textContent = 'x1.00';
        };

        window.handleMines = async () => {
            if (!minesActive) {
                const betInput = document.getElementById('mines-bet');
                const countInput = document.getElementById('mine-count');
                const bet = parseInt(betInput.value);
                const count = parseInt(countInput.value);

                if (isNaN(bet) || bet < 1 || window.userBalance < bet) return alert("Недостаточно баланса!");
                if (isNaN(count) || count < 1 || count > 24) return alert("Мин должно быть от 1 до 24");

                curBet = bet;
                curMinesCount = count;
                curMult = 1;
                await window.updateBalance(-bet);

                minePos = [];
                while(minePos.length < count) {
                    let r = Math.floor(Math.random() * 25);
                    if(!minePos.includes(r)) minePos.push(r);
                }

                revCells = [];
                minesActive = true;
                
                document.querySelectorAll('.mine-cell').forEach(c => { 
                    c.className = 'mine-cell'; 
                    c.innerHTML = ''; 
                });
                
                document.getElementById('mines-btn').textContent = 'ВЫВЕСТИ';
            } else {
                if (revCells.length === 0) return alert("Откройте хотя бы одну ячейку!");
                
                const winAmount = Math.floor(curBet * curMult);
                await window.updateBalance(winAmount);
                
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                window.initMines();
            }
        };

        // ================= WHEEL OF FORTUNE =================
        const wheelValues = [1, 50, 2, 10, 5, 20, 1, 100, 2, 5, 30, 1, 150, 2, 10]; 
        const sliceDeg = 360 / 15;
        let isSpinning = false;
        let currentRotation = 0;
        const spinCost = 10;

        window.initWheel = () => {
            const wheel = document.getElementById('wheel');
            if(!wheel) return;
            
            let gradient = 'conic-gradient(';
            const colors = ['rgba(255,255,255,0.05)', 'rgba(255,255,255,0.15)'];
            
            for (let i = 0; i < 15; i++) {
                let color = wheelValues[i] === 150 ? 'rgba(255, 51, 102, 0.6)' : 
                            wheelValues[i] === 100 ? 'rgba(51, 204, 255, 0.6)' : colors[i % 2];
                let startAngle = i * sliceDeg;
                let endAngle = startAngle + sliceDeg;
                gradient += `${color} ${startAngle}deg ${endAngle}deg${i === 14 ? ')' : ','}`;
            }
            wheel.style.background = gradient;
            
            wheel.innerHTML = '';
            for(let i = 0; i < 15; i++) {
                const label = document.createElement('div');
                label.className = 'wheel-label';
                label.style.transform = `rotate(${i * sliceDeg + sliceDeg/2}deg) translateY(-105px)`;
                label.textContent = wheelValues[i] + ' ₽';
                wheel.appendChild(label);
            }
        };

        window.spinWheel = async () => {
            if (isSpinning) return;
            
            if (window.userBalance < spinCost) {
                return alert(`Недостаточно баланса! Цена: ${spinCost} ₽`);
            }

            await window.updateBalance(-spinCost); 
            isSpinning = true;
            document.getElementById('wheel-btn').disabled = true;

            const wheel = document.getElementById('wheel');
            const randomSlot = Math.floor(Math.random() * 15);
            const spins = 5 + Math.floor(Math.random() * 3);
            const targetDegree = (spins * 360) + (360 - (randomSlot * sliceDeg + sliceDeg / 2));
            
            const degreesToAdd = targetDegree - (currentRotation % 360);
            currentRotation += degreesToAdd;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                document.getElementById('wheel-btn').disabled = false;
                
                const winAmount = wheelValues[randomSlot];
                await window.updateBalance(winAmount);
                
                if (winAmount >= 50) {
                    if (typeof confetti === 'function') {
                        confetti({ particleCount: 150, spread: 80, origin: { y: 0.8 } });
                    }
                }
            }, 4000);
        };

        // ================= ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ =================
        window.onload = () => {
            window.initMines();
            window.initWheel();
        };
    </script>
</body>
</html>
