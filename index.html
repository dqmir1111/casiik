<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DQMJRKA BET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion, deleteDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dqmjrka-bet-v5"; 

        let currentUid = null;
        let balance = 0;
        let isMaintenance = false;
        let usedPromos = [];

        // Reels config
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 90;

        // Mines state
        let minesCount = 3;
        let minePositions = [];
        let revealedCells = [];
        let isMinesActive = false;
        let currentMult = 1.0;

        // --- AUTH & DATA SYNC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { balance: 0, usedPromos: [], lastActive: Date.now() });
                }

                onSnapshot(userRef, (d) => {
                    if (d.exists()) {
                        const data = d.data();
                        balance = data.balance || 0;
                        usedPromos = data.usedPromos || [];
                        document.querySelectorAll('.balance-val').forEach(el => el.textContent = balance);
                    }
                });

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'config'), (d) => {
                    if (d.exists()) {
                        isMaintenance = d.data().maintenance || false;
                        document.getElementById('m-screen').style.display = isMaintenance ? 'flex' : 'none';
                    }
                });
            } else {
                signInAnonymously(auth);
            }
        });

        // --- NAVIGATION ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`${tab}-page`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- SLOTS LOGIC ---
        window.spin = async () => {
            if (balance < 1 || isMaintenance) return;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            const userRef = doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data');
            await updateDoc(userRef, { balance: increment(-1) });

            const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2')];
            const results = await Promise.all(reels.map((r, i) => {
                return new Promise(resolve => {
                    const target = symbols[Math.floor(Math.random() * symbols.length)];
                    const items = r.querySelectorAll('.s-item');
                    items[items.length - 1].textContent = target;
                    const duration = 1200 + (i * 400);
                    
                    r.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0.9, 0.1, 1)`;
                    r.style.transform = `translateY(-${(items.length - 1) * ITEM_HEIGHT}px)`;
                    
                    setTimeout(() => {
                        r.style.transition = 'none';
                        r.style.transform = 'translateY(0)';
                        items.forEach(it => it.textContent = target);
                        resolve(target);
                    }, duration);
                });
            }));

            const counts = {};
            results.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));

            if (max >= 2) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('win-modal').style.display = 'flex';
                const isJack = max === 3;
                document.getElementById('win-title').textContent = isJack ? "JACKPOT!" : "BIG WIN!";
                document.getElementById('win-opt1').textContent = isJack ? "+3 СПИНА" : "+2 СПИНА";
                window.lastWinType = max;
            }
            btn.disabled = false;
        };

        window.claimWin = async (choice) => {
            document.getElementById('win-modal').style.display = 'none';
            if (choice === 1) {
                const add = window.lastWinType === 3 ? 3 : 2;
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data'), { balance: increment(add) });
            }
        };

        // --- MINES LOGIC ---
        window.initMines = () => {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.innerHTML = '?';
                cell.onclick = () => revealCell(i, cell);
                grid.appendChild(cell);
            }
            isMinesActive = false;
            document.getElementById('mines-action-btn').textContent = 'ИГРАТЬ';
            document.getElementById('mines-mult').textContent = 'x1.00';
        };

        window.handleMinesAction = async () => {
            if (!isMinesActive) {
                if (balance < 1) return alert('Мало спинов');
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data'), { balance: increment(-1) });

                minesCount = parseInt(document.getElementById('mine-count').value) || 3;
                minePositions = [];
                while(minePositions.length < minesCount) {
                    let r = Math.floor(Math.random() * 25);
                    if(!minePositions.includes(r)) minePositions.push(r);
                }
                
                revealedCells = [];
                isMinesActive = true;
                currentMult = 1.0;
                document.querySelectorAll('.mine-cell').forEach(c => {
                    c.className = 'mine-cell';
                    c.innerHTML = '?';
                });
                document.getElementById('mines-action-btn').textContent = 'ЗАБРАТЬ';
            } else {
                const win = Math.floor(1 * currentMult);
                if (win > 0) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data'), { balance: increment(win) });
                    alert(`Забрали ${win} спинов!`);
                }
                initMines();
            }
        };

        function revealCell(idx, el) {
            if (!isMinesActive || revealedCells.includes(idx)) return;
            revealedCells.push(idx);
            
            if (minePositions.includes(idx)) {
                el.classList.add('bomb');
                el.innerHTML = '<i class="fas fa-bomb"></i>';
                isMinesActive = false;
                setTimeout(() => { alert('БОМБА!'); initMines(); }, 300);
            } else {
                el.classList.add('gem');
                el.innerHTML = '<i class="fas fa-gem"></i>';
                const n = 25, m = minesCount, r = revealedCells.length;
                let mult = 1;
                for(let i=0; i<r; i++) mult *= (n-i)/(n-m-i);
                currentMult = mult;
                document.getElementById('mines-mult').textContent = `x${mult.toFixed(2)}`;
            }
        }

        // --- PROMO ---
        window.activatePromo = async () => {
            const input = document.getElementById('promo-input');
            const code = input.value.trim().toUpperCase();
            if (!code || usedPromos.includes(code)) return alert('Неверный код');
            
            const promoRef = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const snap = await getDoc(promoRef);
            
            if (snap.exists()) {
                const data = snap.data();
                if (data.uses >= data.maxUses) return alert('Код закончился');
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUid, 'profile', 'data'), { 
                    balance: increment(data.value),
                    usedPromos: arrayUnion(code)
                });
                await updateDoc(promoRef, { uses: increment(1) });
                alert('Спины начислены!');
                input.value = '';
            } else alert('Кода не существует');
        };

        // --- ADMIN PANEL REWORKED ---
        window.openAdmin = () => {
            const p = prompt('Пароль:');
            if (p === '0501') {
                document.getElementById('admin-modal').style.display = 'flex';
                switchAdminTab('create');
            }
        };

        window.switchAdminTab = (tab) => {
            document.querySelectorAll('.adm-view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.adm-tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`adm-v-${tab}`).style.display = 'block';
            event.currentTarget.classList.add('active');

            if (tab === 'codes') loadAdminPromos();
            if (tab === 'users') loadAdminUsers();
        };

        window.loadAdminUsers = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'users'));
            const list = document.getElementById('adm-user-list');
            list.innerHTML = 'Загрузка...';
            
            let html = '';
            for (const uDoc of snap.docs) {
                const prof = await getDoc(doc(db, 'artifacts', appId, 'users', uDoc.id, 'profile', 'data'));
                if (prof.exists()) {
                    const d = prof.data();
                    html += `
                        <div class="adm-card">
                            <div style="flex:1">
                                <div style="font-size:0.6rem; opacity:0.5;">ID: ${uDoc.id.slice(0,8)}...</div>
                                <div style="font-weight:700">Спины: ${d.balance}</div>
                            </div>
                            <div style="display:flex; gap:5px">
                                <input type="number" id="adm-set-${uDoc.id}" class="adm-mini-input" placeholder="0">
                                <button onclick="setBalance('${uDoc.id}')" class="adm-set-btn">SET</button>
                            </div>
                        </div>`;
                }
            }
            list.innerHTML = html || 'Нет пользователей';
        };

        window.setBalance = async (uid) => {
            const val = parseInt(document.getElementById(`adm-set-${uid}`).value);
            if (!isNaN(val)) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), { balance: val });
                loadAdminUsers();
            }
        };

        window.loadAdminPromos = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'promocodes'));
            const list = document.getElementById('adm-promo-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="adm-card">
                        <div style="flex:1">
                            <b style="color:var(--accent)">${d.id}</b>
                            <div style="font-size:0.7rem; opacity:0.6">+${data.value}🎰 | ${data.uses}/${data.maxUses} акт.</div>
                        </div>
                        <button onclick="deletePromo('${d.id}')" class="adm-del-btn">DEL</button>
                    </div>`;
            });
        };

        window.createPromo = async () => {
            const n = document.getElementById('p-n').value.toUpperCase();
            const v = parseInt(document.getElementById('p-v').value);
            const m = parseInt(document.getElementById('p-m').value);
            if (n && v && m) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', n), { value: v, maxUses: m, uses: 0 });
                alert('Создано');
                document.getElementById('p-n').value = '';
            }
        };

        window.deletePromo = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', id));
            loadAdminPromos();
        };

        window.toggleTech = async (status) => {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'config'), { maintenance: status });
            alert(`Тех. работы: ${status ? 'ВКЛ' : 'ВЫКЛ'}`);
        };

        window.onload = () => {
            const reels = document.querySelectorAll('.s-reel');
            reels.forEach(r => {
                for(let i=0; i<35; i++) {
                    const d = document.createElement('div');
                    d.className = 's-item';
                    d.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    r.appendChild(d);
                }
            });
            initMines();
        };
    </script>

    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #f0f6fc; --gray: #8b949e; --border: #30363d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .bal-badge { background: var(--card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; }

        .app-page { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        .app-page.active { display: block; }

        .slots-box { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .s-view { display: flex; justify-content: center; gap: 8px; background: #000; padding: 10px; border-radius: 15px; height: 110px; overflow: hidden; margin: 20px 0; }
        .s-win { width: 80px; height: 90px; background: #0d1117; border-radius: 10px; position: relative; overflow: hidden; }
        .s-reel { position: absolute; top:0; width:100%; display: flex; flex-direction: column; }
        .s-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--accent); color: #fff; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { opacity: 0.5; }

        .m-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .mine-cell { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; }
        .mine-cell.gem { background: #1a3a2a; color: #39d353; font-size: 1.5rem; }
        .mine-cell.bomb { background: #3a1a1a; color: #f85149; font-size: 1.5rem; }

        .nav-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; z-index: 100; }
        .nav-bar { background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 35px; display: flex; padding: 10px; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--accent); }

        .modal { position: fixed; inset:0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 360px; padding: 25px; border-radius: 25px; }

        /* ADMIN SPECIFIC */
        .adm-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .adm-tab-btn { flex:1; padding: 8px; font-size: 0.7rem; font-weight: 800; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; }
        .adm-tab-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .adm-view { display: none; }
        .adm-card { background: #0d1117; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; }
        .adm-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 8px; font-size: 0.9rem; }
        .adm-mini-input { width: 60px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; padding: 5px; text-align: center; }
        .adm-set-btn { background: var(--accent); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
        .adm-del-btn { background: #f85149; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; }

        .m-screen { position: fixed; inset:0; background: #0d1117; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="m-screen" class="m-screen">
        <i class="fas fa-tools" style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h1>ТЕХ. РАБОТЫ</h1>
        <p style="opacity: 0.6;">Скоро вернемся!</p>
        <button onclick="openAdmin()" style="margin-top: 50px; opacity: 0.1; background: none; border: none; color: #fff;">PANEL</button>
    </div>

    <header>
        <div style="font-weight: 900; color: var(--accent);">DQMJRKA</div>
        <div class="bal-badge"><i class="fas fa-coins" style="color: gold;"></i> <span class="balance-val">0</span></div>
    </header>

    <!-- PAGE: SLOTS -->
    <div id="slots-page" class="app-page active">
        <div class="slots-box">
            <div class="s-view">
                <div class="s-win"><div class="s-reel" id="r0"></div></div>
                <div class="s-win"><div class="s-reel" id="r1"></div></div>
                <div class="s-win"><div class="s-reel" id="r2"></div></div>
            </div>
            <button class="btn-main" id="spin-btn" onclick="spin()">КРУТИТЬ (1 🎰)</button>
        </div>
        <div style="text-align: center; margin-top: 50px; font-size: 0.6rem; opacity: 0.1;" onclick="openAdmin()">SYSTEM V5</div>
    </div>

    <!-- PAGE: MINES -->
    <div id="mines-page" class="app-page">
        <div style="display: flex; justify-content: space-between; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border);">
            <div><span style="font-size: 0.6rem; opacity: 0.5; display: block;">МНОЖИТЕЛЬ</span> <b id="mines-mult" style="color: #39d353;">x1.00</b></div>
            <div style="text-align: right;"><span style="font-size: 0.6rem; opacity: 0.5; display: block;">СТАВКА</span> <b>1 🎰</b></div>
        </div>
        <div class="m-grid" id="mines-grid"></div>
        <div class="slots-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Мины:</span>
                <input type="number" id="mine-count" value="3" min="1" max="24" style="width: 70px; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 10px; text-align: center;">
            </div>
            <button class="btn-main" id="mines-action-btn" onclick="handleMinesAction()">ИГРАТЬ</button>
        </div>
    </div>

    <!-- PAGE: PROMO -->
    <div id="promo-page" class="app-page">
        <div class="slots-box">
            <h2 style="margin-top:0">ПРОМОКОД</h2>
            <input type="text" id="promo-input" class="adm-input" placeholder="ВВЕДИТЕ КОД" style="text-align: center; font-weight: 800; font-size: 1.2rem; padding: 15px;">
            <button class="btn-main" onclick="activatePromo()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <!-- NAV BAR -->
    <div class="nav-wrap">
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('slots')">
                <i class="fas fa-dice"></i>
                <span>Слоты</span>
            </div>
            <div class="nav-item" onclick="switchTab('mines')">
                <i class="fas fa-bomb"></i>
                <span>Мины</span>
            </div>
            <div class="nav-item" onclick="switchTab('promo')">
                <i class="fas fa-ticket-alt"></i>
                <span>Промо</span>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" class="modal">
        <div class="modal-box" style="text-align: center;">
            <h1 id="win-title" style="color: var(--accent); margin-top: 0;">WIN!</h1>
            <button class="btn-main" id="win-opt1" onclick="claimWin(1)" style="margin-bottom: 10px;">+2 СПИНА</button>
            <button class="btn-main" onclick="claimWin(2)" style="background: #21262d;">ВЕРНУТЬ ВЕЩЬ</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-modal" class="modal">
        <div class="modal-box" style="max-height: 90vh; overflow-y: auto;">
            <div class="adm-tabs">
                <button class="adm-tab-btn active" onclick="switchAdminTab('create')">СОЗДАТЬ</button>
                <button class="adm-tab-btn" onclick="switchAdminTab('codes')">КОДЫ</button>
                <button class="adm-tab-btn" onclick="switchAdminTab('users')">ЮЗЕРЫ</button>
            </div>

            <!-- VIEW: CREATE PROMO -->
            <div id="adm-v-create" class="adm-view">
                <input id="p-n" placeholder="НАЗВАНИЕ КОДА" class="adm-input">
                <input id="p-v" type="number" placeholder="СКОЛЬКО СПИНОВ" class="adm-input">
                <input id="p-m" type="number" placeholder="ЛИМИТ АКТИВАЦИЙ" class="adm-input">
                <button class="btn-main" onclick="createPromo()" style="padding: 12px; font-size: 0.9rem;">СОЗДАТЬ КОД</button>
                
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
                <p style="font-size: 0.7rem; opacity: 0.5;">УПРАВЛЕНИЕ ТЕХ. РАБОТАМИ:</p>
                <div style="display:flex; gap:10px;">
                    <button onclick="toggleTech(true)" style="flex:1; background: #f85149; border:none; padding:10px; border-radius:8px; color:#fff; font-weight:700;">ВКЛ</button>
                    <button onclick="toggleTech(false)" style="flex:1; background: #39d353; border:none; padding:10px; border-radius:8px; color:#fff; font-weight:700;">ВЫКЛ</button>
                </div>
            </div>

            <!-- VIEW: CODES LIST -->
            <div id="adm-v-codes" class="adm-view">
                <div id="adm-promo-list"></div>
            </div>

            <!-- VIEW: USERS LIST -->
            <div id="adm-v-users" class="adm-view">
                <div id="adm-user-list"></div>
            </div>

            <button class="btn-main" onclick="document.getElementById('admin-modal').style.display='none'" style="background: #21262d; margin-top: 20px; font-size: 0.9rem; padding: 12px;">ЗАКРЫТЬ</button>
        </div>
