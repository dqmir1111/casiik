<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DQMJRKA BET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dqmjrka-bet-v3";

        let user = null;
        let userData = { balance: 0, usedPromos: [] };
        let activeTab = 'slots';
        let isMaintenance = false;

        // Mines Game State
        let minesCount = 5;
        let minePositions = [];
        let revealedCells = [];
        let isMinesGameOver = false;
        let currentMinesBet = 1;
        let isGameStarted = false;

        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 90;

        // --- Auth & Sync ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                const userRef = doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'data');
                const snap = await getDoc(userRef);
                if (!snap.exists()) await setDoc(userRef, { balance: 0, usedPromos: [], lastActive: Date.now() });

                onSnapshot(userRef, (d) => {
                    if (d.exists()) {
                        userData = d.data();
                        document.querySelectorAll('.balance-val').forEach(el => el.textContent = userData.balance);
                    }
                });

                // Global Config
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'config'), (d) => {
                    if (d.exists()) {
                        isMaintenance = d.data().maintenance;
                        document.getElementById('m-screen').style.display = isMaintenance ? 'flex' : 'none';
                    }
                });
            } else {
                signInAnonymously(auth);
            }
        });

        // --- Navigation ---
        window.switchTab = (tab) => {
            activeTab = tab;
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`${tab}-page`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
        };

        // --- Slots Logic ---
        window.spin = async () => {
            if (userData.balance < 1 || isMaintenance) return;
            const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
            await updateDoc(userRef, { balance: increment(-1) });

            const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2')];
            const results = await Promise.all(reels.map((r, i) => {
                return new Promise(resolve => {
                    const target = symbols[Math.floor(Math.random() * symbols.length)];
                    const items = r.querySelectorAll('.s-item');
                    items[items.length-1].textContent = target;
                    const time = 1500 + i * 500;
                    r.style.transition = `transform ${time}ms cubic-bezier(0.1, 0.9, 0.1, 1)`;
                    r.style.transform = `translateY(-${(items.length-1) * ITEM_HEIGHT}px)`;
                    setTimeout(() => {
                        r.style.transition = 'none';
                        r.style.transform = 'translateY(0)';
                        items.forEach(it => it.textContent = target);
                        resolve(target);
                    }, time);
                });
            }));

            const counts = {};
            results.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));
            if (max >= 2) showWin(max);
        };

        function showWin(type) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            const modal = document.getElementById('win-modal');
            modal.style.display = 'flex';
            const isJack = type === 3;
            document.getElementById('win-title').textContent = isJack ? "JACKPOT!" : "BIG WIN!";
            document.getElementById('win-opt1').textContent = isJack ? "+3 СПИНА" : "+2 СПИНА";
            window.winType = type;
        }

        window.claimWin = async (choice) => {
            document.getElementById('win-modal').style.display = 'none';
            if (choice === 1) {
                const add = window.winType === 3 ? 3 : 2;
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), { balance: increment(add) });
            }
        };

        // --- Mines Logic ---
        window.initMines = () => {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.textContent = i + 1;
                cell.onclick = () => revealMine(i, cell);
                grid.appendChild(cell);
            }
            isGameStarted = false;
            revealedCells = [];
            document.getElementById('mines-action-btn').textContent = 'ИГРАТЬ';
            document.getElementById('mines-multiplier').textContent = 'x1.00';
        };

        window.startMines = async () => {
            if (isGameStarted) {
                // Cashout
                const mult = parseFloat(document.getElementById('mines-multiplier').textContent.replace('x', ''));
                const win = Math.floor(currentMinesBet * mult);
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), { balance: increment(win) });
                alert(`Вы забрали ${win} спинов!`);
                initMines();
                return;
            }

            if (userData.balance < 1) return alert('Недостаточно спинов');
            currentMinesBet = 1; 
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), { balance: increment(-1) });
            
            minesCount = parseInt(document.getElementById('mine-count-input').value);
            minePositions = [];
            while(minePositions.length < minesCount) {
                let r = Math.floor(Math.random() * 25);
                if(!minePositions.includes(r)) minePositions.push(r);
            }
            
            isGameStarted = true;
            revealedCells = [];
            isMinesGameOver = false;
            document.querySelectorAll('.mine-cell').forEach(c => {
                c.classList.remove('revealed', 'bomb', 'gem');
                c.innerHTML = '';
            });
            document.getElementById('mines-action-btn').textContent = 'ЗАБРАТЬ';
        };

        function revealMine(idx, el) {
            if (!isGameStarted || revealedCells.includes(idx) || isMinesGameOver) return;
            
            revealedCells.push(idx);
            el.classList.add('revealed');
            
            if (minePositions.includes(idx)) {
                el.classList.add('bomb');
                el.innerHTML = '<i class="fas fa-bomb"></i>';
                isMinesGameOver = true;
                isGameStarted = false;
                setTimeout(() => {
                    alert('БУМ! Вы проиграли.');
                    initMines();
                }, 500);
            } else {
                el.classList.add('gem');
                el.innerHTML = '<i class="fas fa-gem"></i>';
                updateMinesMultiplier();
            }
        }

        function updateMinesMultiplier() {
            const n = 25;
            const m = minesCount;
            const r = revealedCells.length;
            
            // Упрощенная формула коэффициента
            let multiplier = 1;
            for(let i=0; i<r; i++) {
                multiplier *= (n - i) / (n - m - i);
            }
            document.getElementById('mines-multiplier').textContent = `x${multiplier.toFixed(2)}`;
        }

        // --- Promo ---
        window.applyPromo = async () => {
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            if (!code || userData.usedPromos.includes(code)) return;
            
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                const d = snap.data();
                if (d.uses >= d.maxUses) return alert('Код закончился');
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), { 
                    balance: increment(d.value),
                    usedPromos: arrayUnion(code)
                });
                await updateDoc(ref, { uses: increment(1) });
                alert('Успешно!');
            }
        };

        // --- Admin ---
        window.openAdmin = () => {
            const pass = prompt('Пароль:');
            if (pass === '0501') document.getElementById('admin-modal').style.display = 'flex';
        };

        window.loadUsers = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'users'));
            const list = document.getElementById('admin-user-list');
            list.innerHTML = '';
            for (const uDoc of snap.docs) {
                const prof = await getDoc(doc(db, 'artifacts', appId, 'users', uDoc.id, 'profile', 'data'));
                if (prof.exists()) {
                    const data = prof.data();
                    const item = document.createElement('div');
                    item.className = 'admin-user-card';
                    item.innerHTML = `
                        <div style="flex:1">
                            <div style="font-size:0.7rem; opacity:0.5">ID: ${uDoc.id.slice(0,6)}...</div>
                            <div style="font-weight:700">Спины: ${data.balance}</div>
                        </div>
                        <button onclick="editUser('${uDoc.id}')" class="btn-edit">ИЗМЕНИТЬ</button>
                    `;
                    list.appendChild(item);
                }
            }
        };

        window.editUser = async (uid) => {
            const val = prompt('Новый баланс:');
            if (val !== null) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), { balance: parseInt(val) });
                loadUsers();
            }
        };

        window.savePromo = async () => {
            const name = document.getElementById('p-name').value.toUpperCase();
            const val = parseInt(document.getElementById('p-val').value);
            const max = parseInt(document.getElementById('p-max').value);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), { value: val, maxUses: max, uses: 0 });
            alert('Создан');
        };

        window.toggleTech = async (val) => {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'config'), { maintenance: val });
        };

        // --- Init ---
        window.onload = () => {
            const reels = document.querySelectorAll('.s-reel');
            reels.forEach(r => {
                for(let i=0; i<30; i++) {
                    const div = document.createElement('div');
                    div.className = 's-item';
                    div.textContent = symbols[Math.floor(Math.random()*symbols.length)];
                    r.appendChild(div);
                }
            });
            initMines();
        };
    </script>

    <style>
        :root {
            --bg: #0b0e11;
            --card: #151a21;
            --accent: #3b82f6;
            --text: #ffffff;
            --gray: #9ca3af;
            --ios-tab: rgba(28, 28, 30, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- Header --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }
        .balance-chip { background: var(--card); padding: 8px 16px; border-radius: 20px; font-weight: 700; border: 1px solid #2d3748; }

        /* --- Pages --- */
        .app-page { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: none; }
        .app-page.active { display: block; }

        /* --- Slots --- */
        .slots-wrap { background: var(--card); border-radius: 24px; padding: 20px; text-align: center; margin-top: 20px; border: 1px solid #2d3748; }
        .s-container { display: flex; justify-content: center; gap: 10px; background: #000; padding: 10px; border-radius: 16px; margin: 20px 0; overflow: hidden; height: 110px; }
        .s-window { width: 80px; height: 90px; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .s-reel { position: absolute; top: 0; width: 100%; display: flex; flex-direction: column; }
        .s-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .btn-spin { width: 100%; background: var(--accent); border: none; padding: 18px; border-radius: 16px; color: #fff; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        /* --- Mines --- */
        .mines-header { display: flex; justify-content: space-between; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 16px; }
        .grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .mine-cell { 
            aspect-ratio: 1; background: #2d3748; border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
            transition: 0.2s; cursor: pointer; border-bottom: 3px solid #1a202c;
        }
        .mine-cell.revealed { background: #1a202c; border-bottom: none; transform: translateY(2px); }
        .mine-cell.gem { color: #10b981; font-size: 1.5rem; }
        .mine-cell.bomb { color: #ef4444; font-size: 1.5rem; }
        .mines-ctrl { margin-top: 20px; background: var(--card); padding: 20px; border-radius: 20px; }
        .m-input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .m-input-group input { background: #000; border: 1px solid #2d3748; color: #fff; padding: 10px; border-radius: 10px; width: 60px; text-align: center; }

        /* --- iOS Tab Bar --- */
        .tab-bar-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 1000;
        }
        .tab-bar {
            background: var(--ios-tab); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 10px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { text-align: center; color: var(--gray); flex: 1; font-size: 0.65rem; font-weight: 500; transition: 0.3s; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); transform: scale(1.1); }

        /* --- Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-box { background: var(--card); width: 100%; max-width: 340px; padding: 30px; border-radius: 30px; text-align: center; border: 1px solid #2d3748; }
        .btn-opt { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: 700; cursor: pointer; }

        /* --- Admin --- */
        .admin-user-card { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .btn-edit { background: var(--accent); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }

        .promo-box { background: var(--card); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .input-promo { background: #000; border: 1px solid #2d3748; padding: 15px; width: 100%; border-radius: 12px; color: #fff; margin-bottom: 10px; }

        .m-screen { position: fixed; inset:0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="m-screen" class="m-screen">
        <i class="fas fa-tools" style="font-size: 4rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h1>ТЕХ. РАБОТЫ</h1>
        <p style="opacity: 0.6;">Мы обновляем DQMJRKA BET. Вернемся совсем скоро!</p>
        <button onclick="openAdmin()" style="margin-top: 40px; background: none; border: none; color: #222;">ADMIN</button>
    </div>

    <header>
        <div class="logo">DQMJRKA BET</div>
        <div class="balance-chip"><i class="fas fa-coins" style="color: gold;"></i> <span class="balance-val">0</span></div>
    </header>

    <!-- SLOTS PAGE -->
    <div id="slots-page" class="app-page active">
        <div class="slots-wrap">
            <h2 style="margin: 0; font-size: 1rem; opacity: 0.6;">УДАЧНЫЙ СПИН</h2>
            <div class="s-container">
                <div class="s-window"><div class="s-reel" id="r0"></div></div>
                <div class="s-window"><div class="s-reel" id="r1"></div></div>
                <div class="s-window"><div class="s-reel" id="r2"></div></div>
            </div>
            <button class="btn-spin" onclick="spin()">ИГРАТЬ (1 🎰)</button>
        </div>
        <div style="text-align: center; margin-top: 30px; font-size: 0.7rem; opacity: 0.2;" onclick="openAdmin()">V3.0.1 PANEL</div>
    </div>

    <!-- MINES PAGE -->
    <div id="mines-page" class="app-page">
        <div class="mines-header">
            <div>
                <span style="display: block; font-size: 0.6rem; opacity: 0.5;">МНОЖИТЕЛЬ</span>
                <span id="mines-multiplier" style="font-size: 1.5rem; font-weight: 800; color: #10b981;">x1.00</span>
            </div>
            <div style="text-align: right;">
                <span style="display: block; font-size: 0.6rem; opacity: 0.5;">СТАВКА</span>
                <span style="font-size: 1.2rem; font-weight: 700;">1 🎰</span>
            </div>
        </div>

        <div class="grid-5x5" id="mines-grid"></div>

        <div class="mines-ctrl">
            <div class="m-input-group">
                <span>Кол-во мин:</span>
                <input type="number" id="mine-count-input" value="5" min="1" max="24">
            </div>
            <button class="btn-spin" id="mines-action-btn" onclick="startMines()">ИГРАТЬ</button>
        </div>
    </div>

    <!-- PROFILE/PROMO PAGE -->
    <div id="profile-page" class="app-page">
        <h2>ПРОМОКОД</h2>
        <div class="promo-box">
            <input type="text" id="promo-input" class="input-promo" placeholder="ВВЕДИТЕ КОД...">
            <button class="btn-spin" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <!-- iOS TAB BAR -->
    <div class="tab-bar-container">
        <div class="tab-bar">
            <div class="nav-item active" onclick="switchTab('slots')">
                <i class="fas fa-gamepad"></i>
                <span>Слоты</span>
            </div>
            <div class="nav-item" onclick="switchTab('mines')">
                <i class="fas fa-bomb"></i>
                <span>Мины</span>
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <i class="fas fa-ticket-alt"></i>
                <span>Промо</span>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="win-modal" class="modal">
        <div class="modal-box">
            <h1 id="win-title" style="color: var(--accent); margin-top: 0;">WIN!</h1>
            <button class="btn-opt" id="win-opt1" onclick="claimWin(1)" style="background: var(--accent); color: #fff;"></button>
            <button class="btn-opt" onclick="claimWin(2)" style="background: #2d3748; color: #fff;">ВЕРНУТЬ ВЕЩЬ</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-box" style="text-align: left; max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-top: 0;">АДМИНКА</h2>
            
            <div style="background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <p style="font-size: 0.7rem; margin: 0 0 10px 0;">ТЕХ. РАБОТЫ:</p>
                <button onclick="toggleTech(true)" style="background: #ef4444; border:none; padding:8px; border-radius:5px; color:#fff;">ВКЛ</button>
                <button onclick="toggleTech(false)" style="background: #10b981; border:none; padding:8px; border-radius:5px; color:#fff;">ВЫКЛ</button>
            </div>

            <p style="font-size: 0.8rem; font-weight: 700;">СОЗДАТЬ ПРОМО:</p>
            <input id="p-name" placeholder="КОД" class="input-promo" style="padding: 10px;">
            <input id="p-val" type="number" placeholder="СПИНЫ" class="input-promo" style="padding: 10px;">
            <input id="p-max" type="number" placeholder="ЛИМИТ" class="input-promo" style="padding: 10px;">
            <button class="btn-edit" style="width:100%; padding:10px; margin-bottom:20px" onclick="savePromo()">СОЗДАТЬ</button>

            <p style="font-size: 0.8rem; font-weight: 700;">ЮЗЕРЫ:</p>
            <button onclick="loadUsers()" class="btn-edit" style="width:100%; padding:10px; margin-bottom:10px">ОБНОВИТЬ СПИСОК</button>
            <div id="admin-user-list"></div>

            <button class="btn-opt" onclick="closeAdmin()" style="background: #2d3748; color: #fff;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        window.closeAdmin = () => document.getElementById('admin-modal').style.display = 'none';
    </script>

</body>
</html>
