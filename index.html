<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DQBET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion, deleteDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dqmjrka-bet-v6-fixed"; 

        window.currentUid = null;
        window.userBalance = 0;
        window.isMaintenance = false;

        async function initAuth() {
            try {
                await signInAnonymously(auth);
            } catch (e) { console.error("Auth Error", e); }
        }
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUid = user.uid;
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const snap = await getDoc(userRef);
                
                if (!snap.exists()) {
                    // НАЧАЛЬНЫЙ БАЛАНС 0
                    await setDoc(userRef, { balance: 0, usedPromos: [] });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_balances', user.uid), { balance: 0 });
                }

                onSnapshot(userRef, (d) => {
                    if (d.exists()) {
                        window.userBalance = d.data().balance || 0;
                        document.querySelectorAll('.balance-val').forEach(el => el.textContent = window.userBalance);
                    }
                });

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'config'), (d) => {
                    if (d.exists()) {
                        window.isMaintenance = d.data().maintenance || false;
                        const mScreen = document.getElementById('m-screen');
                        if(mScreen) mScreen.style.display = window.isMaintenance ? 'flex' : 'none';
                    }
                });
            }
        });

        window.updateBalance = async (amount) => {
            if (!window.currentUid) return;
            const newBal = window.userBalance + amount;
            await updateDoc(doc(db, 'artifacts', appId, 'users', window.currentUid, 'profile', 'data'), { balance: newBal });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_balances', window.currentUid), { balance: newBal }, { merge: true });
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const navBtn = document.getElementById('nav-' + tab);
            if (navBtn) navBtn.classList.add('active');
        };

        // ADMIN
        window.openAdmin = () => {
            const pass = prompt('Пароль администратора:');
            if (pass === '0501') {
                const modal = document.getElementById('admin-modal');
                if(modal) {
                    modal.style.display = 'flex';
                    window.switchAdminTab('create');
                }
            } else if (pass !== null) {
                alert('Неверный пароль');
            }
        };

        window.switchAdminTab = (t) => {
            document.querySelectorAll('.adm-view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('active'));
            const view = document.getElementById('adm-v-' + t);
            if (view) view.style.display = 'block';
            
            const tabs = document.querySelectorAll('.adm-tab');
            tabs.forEach(tab => {
                if(tab.getAttribute('onclick').includes(t)) tab.classList.add('active');
            });

            if(t==='list') window.loadAdminCodes();
            if(t==='users') window.loadAdminUsers();
        };

        window.loadAdminUsers = async () => {
            const list = document.getElementById('adm-user-list');
            list.innerHTML = '<div style="padding:10px;text-align:center;">Загрузка...</div>';
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'user_balances'));
                list.innerHTML = '';
                snap.forEach(d => {
                    list.innerHTML += `<div class="adm-item">
                        <span style="font-size:0.7rem;">ID: ${d.id.slice(0,6)}.. (${d.data().balance}₽)</span>
                        <div style="display:flex; gap:5px">
                            <button onclick="window.setBal('${d.id}')" style="background:var(--accent); color:white; border:none; padding:4px 8px; border-radius:5px;">$</button>
                            <button onclick="window.delUser('${d.id}')" style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:5px;">DEL</button>
                        </div>
                    </div>`;
                });
            } catch(e) { list.innerHTML = "Ошибка прав"; }
        };

        window.delUser = async (uid) => {
            if(confirm('Удалить пользователя ' + uid + '? Все данные будут стерты.')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_balances', uid));
                await deleteDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'));
                window.loadAdminUsers();
            }
        };

        window.setBal = async (uid) => {
            const v = parseInt(prompt('Установить баланс (₽):'));
            if(!isNaN(v)) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_balances', uid), { balance: v }, { merge: true });
                await updateDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), { balance: v });
                window.loadAdminUsers();
            }
        };

        window.createCode = async () => {
            const name = document.getElementById('adm-n').value.toUpperCase().trim();
            const val = parseInt(document.getElementById('adm-v').value);
            const max = parseInt(document.getElementById('adm-m').value);
            if(!name || isNaN(val)) return alert("Заполните все поля");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), { val, max, uses: 0 });
            alert("Промокод создан!");
            document.getElementById('adm-n').value = '';
            document.getElementById('adm-v').value = '';
            document.getElementById('adm-m').value = '';
        };

        window.loadAdminCodes = async () => {
            const list = document.getElementById('adm-code-list');
            list.innerHTML = '<div style="padding:10px;text-align:center;">Загрузка...</div>';
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'promocodes'));
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="adm-item">
                    <b>${d.id}</b>: ${data.val}₽ (${data.uses}/${data.max})
                    <button onclick="window.delCode('${d.id}')" style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:5px;">X</button>
                </div>`;
            });
        };

        window.delCode = async (id) => { 
            if(confirm('Удалить код?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', id)); 
                window.loadAdminCodes(); 
            }
        };

        window.setTech = async (s) => { 
            await setDoc(doc(db, 'artifacts', appId, 'public', 'config'), { maintenance: s }); 
            alert(s ? "Техработы включены" : "Техработы выключены");
        };

        // SLOTS
        const symbols = ['💎', '7️⃣', '🍒', '🍋', '🔔', '🌟'];
        window.spin = async () => {
            const bet = parseInt(document.getElementById('slots-bet').value);
            if (bet < 1 || window.userBalance < bet) return alert("Недостаточно баланса или неверная ставка");

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            await window.updateBalance(-bet);

            const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2')];
            const results = await Promise.all(reels.map((r, i) => {
                return new Promise(resolve => {
                    const target = symbols[Math.floor(Math.random() * symbols.length)];
                    const items = r.querySelectorAll('.s-item');
                    items[items.length - 1].textContent = target;
                    const duration = 2500; // РОВНО 2.5 СЕКУНДЫ
                    r.style.transition = `transform ${duration}ms cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                    r.style.transform = `translateY(-${(items.length - 1) * 90}px)`;
                    setTimeout(() => {
                        r.style.transition = 'none';
                        r.style.transform = 'translateY(0)';
                        items.forEach(it => it.textContent = target);
                        resolve(target);
                    }, duration);
                });
            }));

            const counts = {};
            results.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));
            if (max >= 2) {
                const win = max === 3 ? bet * 10 : bet * 2;
                confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
                setTimeout(() => { window.updateBalance(win); }, 200);
            }
            btn.disabled = false;
        };

        // MINES
        let minesActive = false, minePos = [], revCells = [], curBet = 0, curMinesCount = 3;
        window.initMines = () => {
            const grid = document.getElementById('mines-grid');
            if(!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const c = document.createElement('div');
                c.className = 'mine-cell disabled';
                c.innerHTML = '<i class="fas fa-lock"></i>';
                c.onclick = () => {
                    if (!minesActive || revCells.includes(i)) return;
                    revCells.push(i);
                    if (minePos.includes(i)) {
                        c.className = 'mine-cell bomb'; c.innerHTML = '💣';
                        minesActive = false;
                        setTimeout(() => { alert('ВЗРЫВ!'); window.initMines(); }, 300);
                    } else {
                        c.className = 'mine-cell gem'; c.innerHTML = '💎';
                        const n=25, m=curMinesCount, r=revCells.length;
                        let mult = 1; for(let j=0; j<r; j++) mult *= (n-j)/(n-m-j);
                        document.getElementById('mines-mult').textContent = 'x' + mult.toFixed(2);
                        document.getElementById('mines-btn').textContent = `ЗАБРАТЬ ${Math.floor(curBet * mult)} ₽`;
                    }
                };
                grid.appendChild(c);
            }
            minesActive = false;
            document.getElementById('mines-btn').textContent = 'НАЧАТЬ ИГРУ';
            document.getElementById('mines-mult').textContent = 'x1.00';
        };

        window.handleMines = async () => {
            if (!minesActive) {
                const bet = parseInt(document.getElementById('mines-bet').value);
                const count = parseInt(document.getElementById('mine-count').value);
                if (bet < 1 || window.userBalance < bet) return alert("Проверьте ставку и баланс");
                curBet = bet; curMinesCount = count;
                await window.updateBalance(-bet);
                minePos = []; while(minePos.length < count) {
                    let r = Math.floor(Math.random()*25); if(!minePos.includes(r)) minePos.push(r);
                }
                revCells = []; minesActive = true;
                document.querySelectorAll('.mine-cell').forEach(c => { 
                    c.className = 'mine-cell'; c.innerHTML = ''; 
                });
                document.getElementById('mines-btn').textContent = 'ВЫВЕСТИ';
            } else {
                const multStr = document.getElementById('mines-mult').textContent.replace('x','');
                const mult = parseFloat(multStr);
                await window.updateBalance(Math.floor(curBet * mult));
                window.initMines();
            }
        };

        window.usePromo = async () => {
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            if(!code) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                const d = snap.data();
                if (d.uses < d.max) {
                    // Проверка на повторное использование
                    const userRef = doc(db, 'artifacts', appId, 'users', window.currentUid, 'profile', 'data');
                    const userSnap = await getDoc(userRef);
                    const used = userSnap.data().usedPromos || [];
                    if(used.includes(code)) return alert("Вы уже использовали этот код!");

                    await window.updateBalance(d.val);
                    await updateDoc(ref, { uses: increment(1) });
                    await updateDoc(userRef, { usedPromos: arrayUnion(code) });
                    alert(`Активировано! +${d.val} ₽`);
                    document.getElementById('promo-input').value = '';
                } else alert("Лимит использований исчерпан");
            } else alert("Код не найден");
        };

        window.onload = () => {
            document.querySelectorAll('.s-reel').forEach(r => {
                for(let i=0; i<40; i++){
                    let d = document.createElement('div'); d.className='s-item'; d.textContent=symbols[i%6]; r.appendChild(d);
                }
            });
            window.initMines();
        };
    </script>

    <style>
        :root { 
            --bg: #0d0b1f; 
            --card: #1a1635; 
            --accent: #6366f1; 
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text: #ffffff; 
            --border: #2e2a5e; 
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 10; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        .balance-badge { background: #000; padding: 6px 14px; border-radius: 12px; font-weight: 800; border: 1px solid var(--accent); color: #22c55e; display: flex; align-items: center; gap: 5px; }

        .app-page { display: none; padding: 10px; height: calc(100vh - 120px); overflow-y: auto; }
        .app-page.active { display: block; }

        .card { background: var(--card); padding: 12px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 8px; position: relative; }
        
        .input-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .input-box input { background: transparent; border: none; color: #fff; width: 80px; text-align: right; font-weight: 800; font-size: 1.1rem; outline: none; }
        .input-box span { font-weight: 600; font-size: 0.8rem; opacity: 0.7; }

        .s-view { display: flex; gap: 8px; justify-content: center; height: 90px; margin: 10px 0; }
        .s-reel-box { width: 80px; height: 90px; position: relative; overflow: hidden; background: #000; border-radius: 12px; border: 1px solid var(--border); }
        .s-reel { position: absolute; width: 100%; top: 0; }
        .s-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        .m-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .mine-cell { aspect-ratio: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .mine-cell.disabled { opacity: 0.3; background: #1a1a1a; cursor: default; color: #444; }
        .mine-cell.gem { background: #059669; box-shadow: inset 0 0 15px #10b981; }
        .mine-cell.bomb { background: #dc2626; box-shadow: inset 0 0 15px #ef4444; }

        .nav { position: fixed; bottom: 12px; left: 12px; right: 12px; background: rgba(26, 22, 53, 0.95); border: 1px solid var(--border); border-radius: 18px; display: flex; padding: 6px; backdrop-filter: blur(15px); z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.2rem; }

        /* MODAL ADMIN - ВЫСОКИЙ Z-INDEX */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999999; padding: 15px; }
        .modal-box { background: var(--card); border: 1px solid var(--accent); padding: 18px; border-radius: 20px; width: 100%; max-width: 360px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        .adm-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .adm-tab { flex: 1; padding: 10px; font-size: 0.65rem; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .adm-tab.active { background: var(--accent); border-color: var(--accent); }
        .adm-view { display: none; max-height: 320px; overflow-y: auto; }
        .adm-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }

        /* ЭКРАН ТЕХРАБОТ - НИЖЕ МОДАЛКИ */
        .m-screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 888888; text-align: center; padding: 20px; }
        
        .admin-trigger { text-align: center; margin-top: 25px; margin-bottom: 40px; }
        .admin-btn { background: var(--border); color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; opacity: 0.4; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ЭКРАН ТЕХРАБОТ -->
    <div id="m-screen" class="m-screen">
        <i class="fas fa-hammer" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px var(--accent-glow);"></i>
        <h2 style="font-weight: 900; letter-spacing: 1px;">ТЕХНИЧЕСКИЕ РАБОТЫ</h2>
        <p style="opacity: 0.6; font-size: 0.9rem; max-width: 250px;">Мы скоро вернемся с новыми обновлениями!</p>
        <button onclick="window.openAdmin()" style="margin-top: 40px; background: none; border: 1px solid #333; color: #555; padding: 8px 15px; border-radius: 20px; font-size: 0.6rem; cursor: pointer;">ADMIN ACCESS</button>
    </div>

    <header>
        <div class="logo">DQBET</div>
        <div class="balance-badge"><span class="balance-val">0</span> ₽</div>
    </header>

    <!-- СЛОТЫ -->
    <div id="slots-page" class="app-page active">
        <div class="card">
            <div class="input-box">
                <span>СТАВКА (₽)</span>
                <input type="number" id="slots-bet" value="10">
            </div>
            <div class="s-view">
                <div class="s-reel-box"><div class="s-reel" id="r0"></div></div>
                <div class="s-reel-box"><div class="s-reel" id="r1"></div></div>
                <div class="s-reel-box"><div class="s-reel" id="r2"></div></div>
            </div>
            <button class="btn" id="spin-btn" onclick="window.spin()">КРУТИТЬ</button>
        </div>
        <div class="admin-trigger">
            <button class="admin-btn" onclick="window.openAdmin()">ADMIN PANEL</button>
        </div>
    </div>

    <!-- МИНЫ -->
    <div id="mines-page" class="app-page">
        <div class="card" style="border-color: #22c55e; padding: 10px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; font-weight: 900; color: #22c55e;">
                <span style="font-size: 0.8rem;">МНОЖИТЕЛЬ</span>
                <span id="mines-mult">x1.00</span>
            </div>
        </div>
        <div class="card">
            <div class="input-box">
                <span>СТАВКА</span>
                <input type="number" id="mines-bet" value="10">
            </div>
            <div class="input-box">
                <span>МИНЫ</span>
                <input type="number" id="mine-count" value="3" min="1" max="24">
            </div>
            <div class="m-grid" id="mines-grid"></div>
            <button class="btn" id="mines-btn" onclick="window.handleMines()">НАЧАТЬ ИГРУ</button>
        </div>
    </div>

    <!-- ПРОМО -->
    <div id="promo-page" class="app-page">
        <div class="card">
            <h3 style="margin: 0 0 15px 0; text-align: center; font-weight: 900; color: var(--accent);">ПРОМОКОД</h3>
            <input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД" style="width: 100%; padding: 15px; border-radius: 12px; background: #000; border: 1px solid var(--border); color: #fff; text-align: center; margin-bottom: 15px; font-weight: 800; font-size: 1.2rem; box-sizing: border-box;">
            <button class="btn" onclick="window.usePromo()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav">
        <div class="nav-item active" id="nav-slots" onclick="window.switchTab('slots')"><i class="fas fa-gamepad"></i>Слоты</div>
        <div class="nav-item" id="nav-mines" onclick="window.switchTab('mines')"><i class="fas fa-bomb"></i>Мины</div>
        <div class="nav-item" id="nav-promo" onclick="window.switchTab('promo')"><i class="fas fa-gift"></i>Промо</div>
    </div>

    <!-- МОДАЛКА АДМИНА -->
    <div id="admin-modal" class="modal">
        <div class="modal-box">
            <div class="adm-tabs">
                <button class="adm-tab active" onclick="window.switchAdminTab('create')">ПРОМО</button>
                <button class="adm-tab" onclick="window.switchAdminTab('list')">СПИСОК</button>
                <button class="adm-tab" onclick="window.switchAdminTab('users')">ЮЗЕРЫ</button>
            </div>

            <div id="adm-v-create" class="adm-view" style="display: block;">
                <input id="adm-n" placeholder="НАЗВАНИЕ КОДА" class="btn" style="background:#000; margin-bottom:6px; border:1px solid var(--border); text-align:left; font-size:0.8rem;">
                <input id="adm-v" type="number" placeholder="СУММА (₽)" class="btn" style="background:#000; margin-bottom:6px; border:1px solid var(--border); text-align:left; font-size:0.8rem;">
                <input id="adm-m" type="number" placeholder="ЛИМИТ" class="btn" style="background:#000; margin-bottom:12px; border:1px solid var(--border); text-align:left; font-size:0.8rem;">
                <button class="btn" onclick="window.createCode()" style="background: #22c55e;">СОЗДАТЬ</button>
                
                <div style="margin-top: 20px; display: flex; gap: 5px;">
                    <button class="btn" onclick="window.setTech(true)" style="background: #ef4444; font-size: 0.6rem; padding: 10px;">ВКЛ ТЕХ</button>
                    <button class="btn" onclick="window.setTech(false)" style="background: #22c55e; font-size: 0.6rem; padding: 10px;">ВЫКЛ ТЕХ</button>
                </div>
            </div>

            <div id="adm-v-list" class="adm-view">
                <div id="adm-code-list"></div>
            </div>

            <div id="adm-v-users" class="adm-view">
                <div id="adm-user-list"></div>
            </div>

            <button class="btn" onclick="document.getElementById('admin-modal').style.display='none'" style="background: #334155; margin-top: 15px; box-shadow: none;">ЗАКРЫТЬ</button>
        </div>
    </div>

</body>
</html>
